apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-test-app-deployment
  labels:
    app: java-test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-test-app
  template:
    metadata:
      labels:
        app: java-test-app
    spec:
      containers:
      - name: java-test-app
        image: varshitha729479/java-test-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: java-test-app-service
spec:
  type: NodePort
  selector:
    app: java-test-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8081
    nodePort: 30007